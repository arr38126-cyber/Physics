<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dr: Fady | Physics Platform</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Playfair+Display:ital,wght@1,700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --brand-dark-navy: #1C2331; 
            --brand-orange: #F57C00;   
            --brand-beige: #FFF8E1;    
        }
        body { 
            background-color: var(--brand-beige); 
            font-family: 'Cairo', sans-serif; 
        }
        .english-font { font-family: 'Playfair Display', serif; }
        .quote-style { font-family: 'Cairo', sans-serif; font-style: italic; }
        .gold-glow { shadow-[0_0_25px_rgba(245,124,0,0.3)] }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6 bg-[radial-gradient(circle_at_center,_var(--tw-gradient-stops))] from-[#fffcf2] to-[#FFF8E1]">

    <div class="max-w-md w-full bg-[#1C2331] rounded-[3rem] shadow-[0_40px_100px_rgba(0,0,0,0.7)] border border-[#F57C00]/20 p-12 text-center relative overflow-hidden">
        
        <div class="absolute -top-32 -left-32 w-96 h-96 bg-[#F57C00]/10 rounded-full filter blur-3xl"></div>
        <div class="absolute -bottom-32 -right-32 w-96 h-96 bg-[#F57C00]/5 rounded-full filter blur-3xl"></div>
        
        <div class="relative z-10 mb-8">
            <div class="w-32 h-32 mx-auto bg-white rounded-3xl p-3 shadow-[0_15px_40px_rgba(245,124,0,0.2)] border-2 border-[#F57C00]/40 transform -rotate-2 hover:rotate-0 transition-all duration-700">
                <img src="https://i.ibb.co/jkMXWC1v/logo.png" alt="Dr Fady Logo" class="w-full h-full object-contain">
            </div>
            <h1 class="text-white text-4xl font-black mt-8 tracking-tighter english-font italic uppercase">Dr Fady</h1>
            <div class="h-1.5 w-16 bg-gradient-to-r from-transparent via-[#F57C00] to-transparent mx-auto mt-3 rounded-full"></div>
        </div>

        <div class="relative z-10 mb-12 px-2">
            <p class="text-[#F57C00] text-xl font-bold quote-style leading-relaxed">
                "وَمَن يَهوَب صُعودَ الجِبالِ يَعِش أَبَدَ الدَهرِ بَينَ الحُفَرِ"
            </p>
        </div>

        <form class="relative z-10 space-y-6">
            <div class="text-right">
                <label class="block text-[#FFF8E1]/40 text-xs mr-3 mb-2 font-bold tracking-widest">كود الطالب</label>
                <input type="text" placeholder="أدخل كودك الخاص" 
                    class="w-full bg-[#0d1117]/80 border border-[#F57C00]/30 rounded-2xl py-5 px-6 text-white focus:outline-none focus:border-[#F57C00] focus:ring-1 focus:ring-[#F57C00] transition-all placeholder:text-gray-700 text-center text-lg">
            </div>
            
            <button type="button" 
                class="w-full bg-[#F57C00] hover:bg-[#ff9126] text-[#1C2331] font-black py-5 rounded-2xl shadow-2xl transform active:scale-95 transition-all text-xl uppercase tracking-wider">
                دخول للمنصة
            </button>
        </form>

        <p class="relative z-10 mt-12 text-[11px] text-[#FFF8E1]/20 tracking-[0.3em] uppercase">
            © 2026 Physics Gate | All Rights Reserved
        </p>
    </div>

</body>
</html>
