<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dr Fady | Physics Platform</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Playfair+Display:ital,wght@1,700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --brand-dark: #1C2331; --brand-orange: #F57C00; --brand-beige: #FFF8E1; }
        body { background-color: var(--brand-beige); font-family: 'Cairo', sans-serif; overflow-x: hidden; }
        .english-font { font-family: 'Playfair Display', serif; }
        .hidden { display: none; }
        input::placeholder { color: rgba(255, 255, 255, 0.2); text-align: center; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 bg-[#FFF8E1]">

    <div class="max-w-md w-full bg-[#1C2331] rounded-[3rem] shadow-2xl border border-[#F57C00]/20 p-10 text-center relative overflow-hidden">
        
        <div class="absolute -top-32 -left-32 w-80 h-80 bg-[#F57C00]/5 rounded-full filter blur-3xl"></div>

        <div class="relative z-10 mb-6">
            <div class="w-24 h-24 mx-auto bg-white rounded-3xl p-2 shadow-xl border-2 border-[#F57C00]/40 transform -rotate-2 hover:rotate-0 transition-all duration-500">
                <img src="https://i.ibb.co/jkMXWC1v/logo.png" alt="Logo" class="w-full h-full object-contain rounded-lg">
            </div>
            <h1 class="text-white text-3xl font-black mt-6 english-font italic uppercase italic">Dr Fady</h1>
            <div class="h-1 w-12 bg-[#F57C00] mx-auto mt-2 rounded-full"></div>
        </div>

        <div id="loginForm" class="relative z-10 space-y-5">
            <p class="text-[#F57C00] text-sm font-bold italic mb-6">"وَمَن يَهوَب صُعودَ الجِبالِ يَعِش أَبَدَ الدَهرِ بَينَ الحُفَرِ"</p>
            
            <div class="space-y-4 text-right">
                <input type="tel" placeholder="رقم الهاتف" class="w-full bg-[#0d1117] border border-[#F57C00]/30 rounded-2xl py-4 px-6 text-white focus:outline-none focus:border-[#F57C00] text-center text-lg">
                <input type="password" placeholder="كلمة السر" class="w-full bg-[#0d1117] border border-[#F57C00]/30 rounded-2xl py-4 px-6 text-white focus:outline-none focus:border-[#F57C00] text-center text-lg">
            </div>
            
            <button class="w-full bg-[#F57C00] text-[#1C2331] font-black py-4 rounded-2xl shadow-2xl hover:scale-[1.02] active:scale-95 transition-all text-lg uppercase">دخول للمنصة</button>
            
            <div class="pt-4 space-y-2">
                <p class="text-[#F57C00]/60 text-xs cursor-pointer hover:underline">نسيت كلمة السر؟</p>
                <p class="text-white/40 text-[11px]">ليس لديك حساب؟ <span onclick="toggleForm('registerForm')" class="text-[#F57C00] cursor-pointer underline font-bold">أنشئ حسابك الآن</span></p>
            </div>
        </div>

        <div id="registerForm" class="relative z-10 space-y-5 hidden">
            <h2 class="text-[#F57C00] text-xl font-black mb-2 tracking-tighter">سجل بياناتك يا بطل</h2>
            
            <div class="space-y-3">
                <input type="text" placeholder="الاسم الثلاثي للطالب" class="w-full bg-[#0d1117] border border-[#F57C00]/30 rounded-xl py-3 px-4 text-white focus:outline-none focus:border-[#F57C00] text-center">
                <input type="tel" placeholder="رقم هاتفك (واتساب)" class="w-full bg-[#0d1117] border border-[#F57C00]/30 rounded-xl py-3 px-4 text-white focus:outline-none focus:border-[#F57C00] text-center">
                <input type="tel" placeholder="رقم هاتف ولي الأمر" class="w-full bg-[#0d1117] border border-[#F57C00]/30 rounded-xl py-3 px-4 text-white focus:outline-none focus:border-[#F57C00] text-center">
                <input type="password" placeholder="اختر كلمة سر" class="w-full bg-[#0d1117] border border-[#F57C00]/30 rounded-xl py-3 px-4 text-white focus:outline-none focus:border-[#F57C00] text-center">
            </div>
            
            <button class="w-full bg-[#F57C00] text-[#1C2331] font-black py-4 rounded-xl shadow-lg hover:scale-[1.02] transition-all uppercase">تأكيد التسجيل</button>
            
            <p class="text-white/40 text-xs pt-2">لديك حساب؟ <span onclick="toggleForm('loginForm')" class="text-[#F57C00] cursor-pointer underline font-bold">تسجيل الدخول</span></p>
        </div>

        <p class="relative z-10 mt-10 text-[9px] text-white/10 tracking-[0.3em] uppercase">© 2026 Physics Gate | Dr Fady</p>
    </div>

    <script>
        function toggleForm(id) {
            document.getElementById('loginForm').classList.toggle('hidden', id !== 'loginForm');
            document.getElementById('registerForm').classList.toggle('hidden', id !== 'registerForm');
        }
    </script>
</body>
</html>
