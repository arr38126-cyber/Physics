<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dr: Fady | Physics Platform</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #3498db;
            --bg: #f8f9fa;
            --error: #e74c3c;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .card {
            background: white;
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 420px;
            text-align: center;
            border-top: 6px solid var(--primary);
        }

        h2 { color: var(--primary); margin-bottom: 10px; font-size: 1.6rem; }

        .slogan {
            color: var(--accent);
            font-weight: bold;
            font-style: italic;
            margin-bottom: 20px;
            font-size: 1.05rem;
            line-height: 1.5;
            background: #f0f7fd;
            padding: 10px;
            border-radius: 10px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 14px;
            transition: 0.3s;
        }

        input:focus { border-color: var(--accent); outline: none; box-shadow: 0 0 5px rgba(52, 152, 219, 0.2); }

        button {
            width: 100%;
            padding: 14px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1.1rem;
            font-weight: bold;
            margin-top: 15px;
            transition: 0.3s;
        }

        button:hover { background-color: var(--accent); transform: translateY(-2px); }
        button:disabled { background-color: #bdc3c7; cursor: not-allowed; }

        .forgot-link {
            display: inline-block;
            margin-top: 15px;
            font-size: 0.85rem;
            color: var(--error);
            text-decoration: none;
            font-weight: 600;
        }

        .footer-link { margin-top: 20px; font-size: 0.9rem; color: #7f8c8d; }
        .footer-link a { color: var(--accent); text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <h2>منصة د. فادي للفيزياء</h2>
    
    <div class="slogan">
        "وَمَن لا يُحِبّ صُعُودَ الجِبَالِ <br> يَعِش أَبَدَ الدَّهرِ بَينَ الحُفَرِ"
    </div>

    <form id="registrationForm">
        <input type="text" id="regName" placeholder="الاسم الثلاثي للطالب" required>
        <input type="tel" id="regPhone" placeholder="رقم موبايلك (WhatsApp)" required>
        <input type="tel" id="regParentPhone" placeholder="رقم موبايل ولي الأمر" required>
        <input type="password" id="regPassword" placeholder="كلمة المرور الجديدة" required>
        
        <button type="submit" id="submitBtn">سجل الآن</button>
    </form>
    
    <a href="#" id="forgotBtn" class="forgot-link">نسيت كلمة المرور؟ تواصل معنا</a>

    <p class="footer-link">لديك حساب بالفعل؟ <a href="#">تسجيل دخول</a></p>
</div>

<script>
    // --- إعدادات الربط النهائية لمشروعك ---
    const SB_URL = 'https://atjzfdlayhfbrdfplkaz.supabase.co';
    const SB_KEY = 'sb_publishable_qgPInys2_HADODQ8rRwORg_lYp6Baf8';

    const _supabase = supabase.createClient(SB_URL, SB_KEY);

    const regForm = document.getElementById('registrationForm');
    const submitBtn = document.getElementById('submitBtn');
    const forgotBtn = document.getElementById('forgotBtn');

    // 1. وظيفة استرجاع الباسورد (تواصل مباشر واتساب)
    forgotBtn.addEventListener('click', (e) => {
        e.preventDefault();
        const whatsappNumber = "201000000000"; // استبدل هذا برقمك الحقيقي يبدأ بـ 20
        const message = encodeURIComponent("يا دكتور فادي، أحتاج مساعدة في استعادة كلمة المرور الخاصة بي على المنصة.");
        window.open(`https://wa.me/${whatsappNumber}?text=${message}`, '_blank');
    });

    // 2. وظيفة تسجيل البيانات في Supabase
    regForm.addEventListener('submit', async (event) => {
        event.preventDefault(); // منع الريفرش

        submitBtn.innerText = "جاري الحفظ...";
        submitBtn.disabled = true;

        const userData = {
            full_name: document.getElementById('regName').value,
            student_phone: document.getElementById('regPhone').value,
            parent_phone: document.getElementById('regParentPhone').value,
            password: document.getElementById('regPassword').value,
            created_at: new Date()
        };

        try {
            const { data, error } = await _supabase
                .from('students') // تأكد أن اسم الجدول في سوبابيز هو students
                .insert([userData]);

            if (error) throw error;

            alert("تم تسجيلك بنجاح يا بطل!.");
            regForm.reset();

        } catch (err) {
            console.error('Registration Error:', err.message);
            alert("حدث خطأ أثناء التسجيل: " + err.message);
        } finally {
            submitBtn.innerText = "سجل الآن";
            submitBtn.disabled = false;
        }
    });
</script>

</body>
</html>
