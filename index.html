<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dr: Fady Adel | Physics Platform</title>
    
    <link rel="icon" href="https://i.ibb.co/nMB0QD7k/fady-logo.png" type="image/png">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        :root {
            --dark-navy: #1a252f; /* الكحلي الغامق القديم */
            --bright-blue: #3498db; /* الأزرق الخاص بالجملة */
            --bg-color: #f4f7f6; /* خلفية الصفحة */
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .card {
            background-color: #ffffff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.15);
            width: 90%;
            max-width: 400px;
            text-align: center;
            border-top: 5px solid var(--dark-navy);
        }

        h2 { 
            color: var(--dark-navy); 
            margin-bottom: 5px; 
            font-size: 28px;
            letter-spacing: 1px;
        }

        .slogan {
            color: var(--bright-blue);
            font-style: italic;
            font-size: 1.1rem;
            margin-bottom: 30px;
            font-weight: bold;
            line-height: 1.6;
        }

        input {
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
            background-color: #fff;
            font-size: 15px;
            text-align: right;
        }

        input:focus {
            border-color: var(--bright-blue);
            outline: none;
            box-shadow: 0 0 5px rgba(52, 152, 219, 0.3);
        }

        button {
            width: 100%;
            padding: 15px;
            background-color: var(--dark-navy);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 18px;
            font-weight: bold;
            margin-top: 20px;
            transition: background 0.3s ease;
        }

        button:hover {
            background-color: #2c3e50;
        }

        .toggle-link {
            margin-top: 25px;
            font-size: 14px;
            color: #555;
        }

        .toggle-link span {
            color: var(--bright-blue);
            cursor: pointer;
            font-weight: bold;
            text-decoration: underline;
        }

        .forgot-link {
            color: #e74c3c;
            text-decoration: none;
            font-size: 13px;
            display: block;
            margin-top: 15px;
            font-weight: 600;
        }

        .hidden { display: none; }
    </style>
</head>
<body>

<div class="card">
    <h2>Dr: Fady Adel</h2>
    <div class="slogan">"وَمَن لا يُحِبّ صُعُودَ الجِبَالِ <br> يَعِش أَبَدَ الدَّهرِ بَينَ الحُفَرِ"</div>

    <div id="loginSection">
        <input type="tel" id="loginPhone" placeholder="رقم الموبايل">
        <input type="password" id="loginPass" placeholder="كلمة المرور">
        <button id="loginBtn">تسجيل الدخول</button>
        <a href="#" id="forgotBtn" class="forgot-link">نسيت كلمة المرور؟ تواصل معنا</a>
        <div class="toggle-link">طالب جديد؟ <span onclick="toggleView('register')">إنشاء حساب جديد</span></div>
    </div>

    <div id="registerSection" class="hidden">
        <input type="text" id="regName" placeholder="الاسم الثلاثي للطالب">
        <input type="tel" id="regPhone" placeholder="رقم الموبايل (WhatsApp)">
        <input type="tel" id="regParent" placeholder="رقم موبايل ولي الأمر">
        <input type="password" id="regPass" placeholder="اختر كلمة مرور">
        <button id="registerBtn">تأكيد الاشتراك</button>
        <div class="toggle-link">لديك حساب؟ <span onclick="toggleView('login')">العودة لتسجيل الدخول</span></div>
    </div>
</div>

<script>
    const SB_URL = 'https://atjzfdlayhfbrdfplkaz.supabase.co';
    const SB_KEY = 'sb_publishable_qgPInys2_HADODQ8rRwORg_lYp6Baf8';
    const _supabase = supabase.createClient(SB_URL, SB_KEY);

    function toggleView(view) {
        document.getElementById('loginSection').classList.toggle('hidden', view === 'register');
        document.getElementById('registerSection').classList.toggle('hidden', view === 'login');
    }

    // 1. إنشاء حساب جديد
    document.getElementById('registerBtn').onclick = async () => {
        const btn = document.getElementById('registerBtn');
        const userData = {
            full_name: document.getElementById('regName').value,
            student_phone: document.getElementById('regPhone').value,
            parent_phone: document.getElementById('regParent').value,
            password: document.getElementById('regPass').value,
            is_logged_in: false
        };

        if(!userData.full_name || !userData.student_phone || !userData.password) return alert("برجاء إدخال كافة البيانات");

        btn.innerText = "جاري الحفظ...";
        btn.disabled = true;

        const { error } = await _supabase.from('students').insert([userData]);

        if (error) {
            alert("خطأ: " + error.message);
        } else {
            alert("تم اشتراكك بنجاح! سجل دخولك الآن للبدء.");
            toggleView('login');
        }
        btn.innerText = "تأكيد الاشتراك";
        btn.disabled = false;
    };

    // 2. تسجيل الدخول + حماية تعدد الأجهزة
    document.getElementById('loginBtn').onclick = async () => {
        const phone = document.getElementById('loginPhone').value;
        const pass = document.getElementById('loginPass').value;
        const btn = document.getElementById('loginBtn');

        if(!phone || !pass) return alert("أدخل رقم الموبايل وكلمة المرور");

        btn.innerText = "جاري الدخول...";
        btn.disabled = true;

        const { data, error } = await _supabase
            .from('students')
            .select('*')
            .eq('student_phone', phone)
            .eq('password', pass)
            .single();

        if (error || !data) {
            alert("البيانات خاطئة، تأكد من الرقم والباسورد");
        } else {
            if (data.is_logged_in) {
                alert("الحساب مفتوح من جهاز آخر، يجب تسجيل الخروج من الجهاز الأول.");
            } else {
                await _supabase.from('students').update({ is_logged_in: true }).eq('student_phone', phone);
                alert("أهلاً بك يا بطل " + data.full_name + "! جاهز لصعود القمة؟");
                // window.location.href = 'lessons.html'; 
            }
        }
        btn.innerText = "تسجيل الدخول";
        btn.disabled = false;
    };

    document.getElementById('forgotBtn').onclick = (e) => {
        e.preventDefault();
        window.open('https://wa.me/201000000000?text=' + encodeURIComponent('يا دكتور فادي، نسيت كلمة المرور الخاصة بي'), '_blank');
    };
</script>
</body>
</html>
