<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dr: Fady Adel | Physics Platform</title>
    
    <link rel="icon" href="https://i.ibb.co/nMB0QD7k/fady-logo.png" type="image/png">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        :root {
            --primary-navy: #1a252f;
            --accent-blue: #3498db;
            --bg-light: #f4f7f6;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-light);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background-color: #ffffff;
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 420px;
            text-align: center;
            border-top: 8px solid var(--primary-navy);
        }

        h2 {
            color: var(--primary-navy);
            margin-bottom: 10px;
            font-size: 28px;
            font-weight: 800;
        }

        .slogan {
            color: var(--accent-blue);
            font-style: italic;
            font-size: 1.1rem;
            margin-bottom: 30px;
            font-weight: 600;
            line-height: 1.6;
            display: block;
        }

        .form-group {
            margin-bottom: 15px;
            text-align: right;
        }

        input {
            width: 100%;
            padding: 15px;
            border: 2px solid #edf2f7;
            border-radius: 12px;
            box-sizing: border-box;
            font-size: 16px;
            transition: all 0.3s ease;
            background: #f8fafc;
            text-align: right;
        }

        input:focus {
            border-color: var(--accent-blue);
            outline: none;
            background: #fff;
            box-shadow: 0 0 0 4px rgba(52, 152, 219, 0.1);
        }

        button {
            width: 100%;
            padding: 16px;
            background-color: var(--primary-navy);
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-size: 18px;
            font-weight: bold;
            margin-top: 20px;
            transition: transform 0.2s, background 0.3s;
        }

        button:hover {
            background-color: #2c3e50;
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
        }

        .switch-link {
            margin-top: 25px;
            font-size: 14px;
            color: #718096;
        }

        .switch-link span {
            color: var(--accent-blue);
            cursor: pointer;
            font-weight: bold;
            text-decoration: underline;
        }

        .forgot-pass {
            display: block;
            margin-top: 15px;
            color: #e53e3e;
            text-decoration: none;
            font-size: 13px;
            font-weight: 600;
        }

        .hidden { display: none; }

        /* رسالة ترحيب منبثقة بسيطة */
        .welcome-msg {
            color: #2f855a;
            font-weight: bold;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Dr: Fady Adel</h2>
    <span class="slogan">"وَمَن لا يُحِبّ صُعُودَ الجِبَالِ <br> يَعِش أَبَدَ الدَّهرِ بَينَ الحُفَرِ"</span>

    <div id="loginSection">
        <div class="form-group">
            <input type="tel" id="loginPhone" placeholder="رقم الموبايل">
        </div>
        <div class="form-group">
            <input type="password" id="loginPass" placeholder="كلمة المرور">
        </div>
        <button id="loginBtn">تسجيل الدخول</button>
        <a href="#" id="waForgot" class="forgot-pass">نسيت كلمة المرور؟ تواصل مع الدعم</a>
        <div class="switch-link">طالب جديد؟ <span onclick="showSection('reg')">إنشاء حساب جديد</span></div>
    </div>

    <div id="registerSection" class="hidden">
        <div class="form-group">
            <input type="text" id="regName" placeholder="الاسم الثلاثي للطالب">
        </div>
        <div class="form-group">
            <input type="tel" id="regPhone" placeholder="رقم الموبايل (واتساب)">
        </div>
        <div class="form-group">
            <input type="tel" id="regParent" placeholder="رقم ولي الأمر">
        </div>
        <div class="form-group">
            <input type="password" id="regPass" placeholder="اختر كلمة مرور">
        </div>
        <button id="registerBtn">تأكيد بيانات الاشتراك</button>
        <div class="switch-link">لديك حساب بالفعل؟ <span onclick="showSection('login')">العودة للدخول</span></div>
    </div>
</div>

<script>
    // بيانات الربط بـ Supabase
    const SB_URL = 'https://atjzfdlayhfbrdfplkaz.supabase.co';
    const SB_KEY = 'sb_publishable_qgPInys2_HADODQ8rRwORg_lYp6Baf8';
    const _supabase = supabase.createClient(SB_URL, SB_KEY);

    // التبديل بين الواجهات
    function showSection(type) {
        document.getElementById('loginSection').classList.toggle('hidden', type === 'reg');
        document.getElementById('registerSection').classList.toggle('hidden', type === 'login');
    }

    // 1. منطق إنشاء حساب جديد
    document.getElementById('registerBtn').onclick = async () => {
        const name = document.getElementById('regName').value;
        const phone = document.getElementById('regPhone').value;
        const parent = document.getElementById('regParent').value;
        const pass = document.getElementById('regPass').value;

        if (!name || !phone || !pass) {
            return alert("برجاء ملء الحقول الأساسية (الاسم، رقمك، الباسورد)");
        }

        const { error } = await _supabase.from('students').insert([{
            full_name: name,
            student_phone: phone,
            parent_phone: parent,
            password: pass,
            is_logged_in: false
        }]);

        if (error) {
            alert("حدث خطأ أثناء التسجيل: " + error.message);
        } else {
            alert("تم تسجيلك بنجاح يا بطل! سجل دخولك الآن.");
            showSection('login');
        }
    };

    // 2. منطق تسجيل الدخول ومنع تعدد الأجهزة
    document.getElementById('loginBtn').onclick = async () => {
        const phone = document.getElementById('loginPhone').value;
        const pass = document.getElementById('loginPass').value;

        if (!phone || !pass) return alert("أدخل رقم الموبايل والباسورد");

        // البحث عن الطالب
        const { data, error } = await _supabase
            .from('students')
            .select('*')
            .eq('student_phone', phone)
            .eq('password', pass)
            .maybeSingle();

        if (error) {
            return alert("خطأ في الاتصال بقاعدة البيانات");
        }

        if (!data) {
            return alert("بيانات الدخول غير صحيحة، تأكد من الرقم والباسورد");
        }

        // منع تعدد الأجهزة
        if (data.is_logged_in) {
            return alert("عذراً، هذا الحساب مفتوح حالياً على جهاز آخر. يرجى تسجيل الخروج من الجهاز الأول أولاً.");
        }

        // تحديث حالة الدخول
        const { error: updateError } = await _supabase
            .from('students')
            .update({ is_logged_in: true })
            .eq('student_phone', phone);

        if (!updateError) {
            alert(`أهلاً بك يا ${data.full_name}! تم تسجيل الدخول بنجاح.`);
            // هنا تضع رابط صفحة المحاضرات لو أردت
            // window.location.href = 'dashboard.html';
        }
    };

    // 3. رابط واتساب لاسترجاع الباسورد
    document.getElementById('waForgot').onclick = (e) => {
        e.preventDefault();
        const msg = encodeURIComponent("دكتور فادي، أحتاج مساعدة في استعادة باسوورد المنصة الخاص بي.");
        window.open(`https://wa.me/201000000000?text=${msg}`, '_blank');
    };
</script>

</body>
</html>
